<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🌎Explorer Log</h1>
        <p>Registre suas aventuras!!</p>
    </header>

    <div class="form-card">
        <input type="text" id="ipt-url" placeholder="URL da Imagem ">
        <input type="text" id="ipt-legenda" placeholder="Onde você estava?">
        <div class="row">
            <input type="number" id="ipt-lat" placeholder="Latitude">
            <input type="number" id="ipt-lon" placeholder="Longitude">
            <button id="loc-atual" onclick="obterLocalizacao()">📍Usar Localização Atual</button>
        </div>
        <button id="btn-adicionar">Adicionar ao Mural</button>

    </div>

    <!--Galeria-->
    <div id="galeria" class="grid-galeria">
        <!--Os Cards serão injetados aqui-->
    </div>
    
<script src="script.js"></script>
</body>
</html>
